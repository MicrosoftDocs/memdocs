productDirectory:
  title: Manage devices, apps, and security with Intune
  summary: Explore the core capabilities of Microsoft Intune and learn how to
    manage, secure, and support devices across your organization.
  items:

    - title: Get started
      imageSrc: ./media/icons/hub-page/device-enrollment.svg
      summary: Set up your Intune environment, understand architecture, licensing, and
        deploy your first policies.
      url: ./device-enrollment/index.yml

    - title: Enroll devices
      imageSrc: ./media/icons/hub-page/device-enrollment.svg
      summary: Onboard Windows, Apple, Android, and Linux devices using automated,
        user-driven, or bulk enrollment methods.
      url: ./device-enrollment/index.yml

    - title: Configure devices
      imageSrc: ./media/icons/hub-page/devices.svg
      summary: Create and deploy device configuration profiles, settings catalog
        policies, and platform-specific templates.
      url: ./device-configuration/index.yml

    - title: Manage apps
      imageSrc: ./media/icons/hub-page/apps.svg
      summary: Add, deploy, configure, and protect apps across managed and unmanaged
        devices.
      url: ./app-management/overview.md

    - title: Device updates
      imageSrc: ./media/icons/hub-page/device-updates.svg
      summary: Manage OS and driver updates for Windows, iOS, macOS, and Android
        devices with update rings and policies.
      url: ./device-updates/windows/index.md

    - title: Device security
      imageSrc: ./media/icons/hub-page/device-security.svg
      summary: Protect devices with compliance policies, security baselines, Defender
        for Endpoint, and endpoint security policies.
      url: ./device-security/overview.md

    - title: Compliance and access
      imageSrc: ./media/icons/hub-page/compliance-access.svg
      summary: Enforce device compliance rules and integrate with Conditional Access
        to control access to organizational resources.
      url: ././device-security/compliance/overview.md

    - title: App protection
      imageSrc: ./media/icons/hub-page/app-protection.svg
      summary: Protect organizational data at the app level with app protection
        policies, without requiring device enrollment.
      url: ./app-management/protection/overview.md

    - title: Copilot and agents
      imageSrc: ./media/icons/hub-page/agent.svg
      summary: Use AI-powered assistance to query device data, troubleshoot issues,
        and automate Intune management tasks.
      url: ./intune-service/copilot/copilot-intune-overview.md

    - title: Analytics and reporting
      imageSrc: ./media/icons/hub-page/reports.svg
      summary: Monitor device health, compliance trends, and app deployment status
        with built-in reports and Endpoint Analytics.
      url: ./endpoint-analytics/index.md

    - title: Device management and support
      imageSrc: ./media/icons/hub-page/remote-actions.svg
      summary: Perform remote actions, manage device inventory, and provide remote
        assistance to users.
      url: device-management/index.yml

    - title: Administration and governance
      imageSrc: ./media/icons/hub-page/administration.svg
      summary: Configure role-based access control, scope tags, audit logs, and
        tenant-wide policies to operate Intune at scale.
      url: ./fundamentals/role-based-access-control/overview.md

