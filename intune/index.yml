productDirectory:
  title: Set up, secure, and operate your device fleet
  summary: Explore the core capabilities of Microsoft Intune and learn how to
    manage, secure, and support devices across your organization.
  items:

  # ── Row 1 · SET UP ──────────────────────────────────────────────

    - title: Get started
      imageSrc: ./media/icons/hub-page/get-started.svg
      summary: Set up your Intune environment, understand architecture and licensing,
        and deploy your first policies.
      url: ./fundamentals/index.yml

    - title: Enroll devices
      imageSrc: ./media/icons/hub-page/device-enrollment.svg
      summary: Onboard Windows, Apple, Android, and Linux devices using automated,
        user-driven, or bulk enrollment methods.
      url: ./device-enrollment/index.yml

    - title: Configure devices
      imageSrc: ./media/icons/hub-page/device-configuration.svg
      summary: Push settings, restrictions, and platform templates to devices with
        configuration profiles and the settings catalog.
      url: ./device-configuration/index.yml

    - title: Deploy and manage apps
      imageSrc: ./media/icons/hub-page/app-management.svg
      summary: Add, deploy, configure, and protect apps across managed and unmanaged
        devices using app policies and assignments.
      url: ./app-management/index.yml

  # ── Row 2 · SECURE ─────────────────────────────────────────────

    - title: Govern and administer
      imageSrc: ./media/icons/hub-page/rbac.svg
      summary: Configure role-based access, scope tags, audit logs, and tenant-wide
        policies to operate Intune at scale.
      url: ./fundamentals/role-based-access-control/overview.md

    - title: Keep devices updated
      imageSrc: ./media/icons/hub-page/device-updates.svg
      summary: Manage OS and driver updates for Windows, iOS, macOS, and Android
        devices with update rings, expedited updates, and policies.
      url: ./device-updates/index.yml

    - title: Secure devices and data
      imageSrc: ./media/icons/hub-page/device-security.svg
      summary: Enforce compliance, deploy security baselines, integrate Defender for
        Endpoint, and manage endpoint security policies.
      url: ./device-security/index.yml

    - title: Protect apps and data
      imageSrc: ./media/icons/hub-page/app-protection.svg
      summary: Safeguard corporate data with app protection policies, conditional
        launch rules, and mobile application management for managed and unmanaged devices.
      url: ./app-management/protection/index.yml

  # ── Row 3 · OPERATE ──────────────────────────────────────────────

    - title: Manage and support devices
      imageSrc: ./media/icons/hub-page/device-management.svg
      summary: Perform remote actions, manage device inventory and lifecycle, and
        provide remote assistance to users.
      url: ./device-management/index.yml

    - title: Monitor and analyze
      imageSrc: ./media/icons/hub-page/reports.svg
      summary: Track device health, compliance trends, and app deployment status
        with built-in reports and Endpoint Analytics.
      url: /intune/endpoint-analytics

    - title: Develop and integrate
      imageSrc: ./media/icons/hub-page/developer.svg
      summary: Use Microsoft Graph APIs, PowerShell, and the Intune Data Warehouse
        to automate management tasks and build custom integrations.
      url: ./developer/index.yml

    - title: Copilot and agents
      imageSrc: ./media/icons/hub-page/copilot.svg
      summary: Use AI-powered Copilot and autonomous agents to query device data,
        troubleshoot issues, and streamline IT workflows.
      url: /intune/copilot/index

